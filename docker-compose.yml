services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoresearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    profiles: ["full"]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      AR_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/autoresearch"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - workspaces:/root/.autoresearch/workspaces

  frontend:
    build:
      context: ./frontend
    profiles: ["full"]
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  workspaces:
